<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Next Rank Training | Training</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="training">
  <div class="page-transition"></div>

  <div class="site-shell">
    <header class="navbar glass">
      <a href="index.html" class="logo nav-link">
        <span class="logo-glow"></span>
        <span>Next Rank Training</span>
      </a>

      <nav class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="training.html" class="nav-link active">Training</a>
      </nav>
    </header>

    <main class="training-main">
      <section class="page-banner glass">
        <p class="eyebrow">Training Library</p>
        <h1>Training Progress</h1>
        <p>
          Every topic has space for a video embed, playlist link, date/time, and notes.
          You can update each section as you start recording your progress.
        </p>
      </section>

      <section class="training-controls glass">
        <div class="search-wrap">
          <input
            type="text"
            id="trainingSearch"
            placeholder="Search training topics..."
          />
        </div>
      </section>

      <section id="trainingContainer" class="training-container"></section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
